name: Release Go Tools

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty for build-only without release."
        required: false
        default:

permissions:
  contents: write

jobs:
  finding-go:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Finding Go tools to build
        id: find
        run: |
          targets='[{"goos":"darwin","goarch":"amd64","suffix":"darwin-amd64"},{"goos":"darwin","goarch":"arm64","suffix":"darwin-arm64"},{"goos":"windows","goarch":"amd64","suffix":"windows-amd64.exe"}]'
          projects=$(find . -name go.mod -exec dirname {} \; | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          matrix=$(jq -n -c --argjson p "$projects" --argjson t "$targets" '{project: $p, target: $t}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Matrix: $matrix"

  build:
    needs: finding-go
    strategy:
      matrix:
        project: ${{ fromJson(needs.finding-go.outputs.matrix).project }}
        target: ${{ fromJson(needs.finding-go.outputs.matrix).target }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.project }}/go.mod

      - name: Tidy modules
        run: cd "${{ matrix.project }}" && go mod tidy

      - name: Build
        id: build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          name=$(echo "${{ matrix.project }}" | tr '/' '-')
          suffix="${{ matrix.target.suffix }}"
          echo "artifact=${name}--${suffix}" >> "$GITHUB_OUTPUT"
          cd "${{ matrix.project }}"
          go build -ldflags="-s -w" -o "${GITHUB_WORKSPACE}/${name}-${suffix}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact }}
          path: "*-${{ matrix.target.suffix }}"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
