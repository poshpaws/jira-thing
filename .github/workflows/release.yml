name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "jira-thing-${{ matrix.suffix }}" .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: jira-thing-${{ matrix.suffix }}
          path: jira-thing-${{ matrix.suffix }}

  build-macos:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            suffix: darwin-arm64
          - goarch: amd64
            suffix: darwin-amd64

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "jira-thing-${{ matrix.suffix }}" .

      - name: Import certificate and sign binary
        id: sign
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        continue-on-error: true
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Import certificate into a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Decode the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > "${CERT_PATH}"

          # Re-encrypt .p12 with a shell-safe password to avoid special char issues
          SAFE_PASS="$(openssl rand -hex 16)"
          PASS_FILE="$RUNNER_TEMP/cert_pass"
          PEM_FILE="$RUNNER_TEMP/cert.pem"
          printf '%s' "${APPLE_CERTIFICATE_PASSWORD}" > "${PASS_FILE}"

          # Decrypt to intermediate PEM (try -legacy first for older format .p12 files)
          openssl pkcs12 -in "${CERT_PATH}" -passin "file:${PASS_FILE}" -nodes -legacy -out "${PEM_FILE}" 2>/dev/null || \
            openssl pkcs12 -in "${CERT_PATH}" -passin "file:${PASS_FILE}" -nodes -out "${PEM_FILE}"

          # Re-encrypt as .p12 with shell-safe password
          openssl pkcs12 -export -in "${PEM_FILE}" -out "$RUNNER_TEMP/safe.p12" -passout "pass:${SAFE_PASS}"
          rm -f "${PASS_FILE}" "${CERT_PATH}" "${PEM_FILE}"

          # Import using the shell-safe password
          security import "$RUNNER_TEMP/safe.p12" \
            -P "${SAFE_PASS}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          rm -f "$RUNNER_TEMP/safe.p12"

          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | head -1 | awk -F'"' '{print $2}')
          if [ -z "${IDENTITY}" ]; then
            echo "::error::No codesigning identity found in keychain."
            security find-identity -v "${KEYCHAIN_PATH}"
            exit 1
          fi

          echo "Signing with: ${IDENTITY}"
          codesign --force --options runtime --sign "${IDENTITY}" "jira-thing-${{ matrix.suffix }}"
          codesign --verify --verbose "jira-thing-${{ matrix.suffix }}"
          echo "SIGNED=true" >> "$GITHUB_ENV"

      - name: Notarise binary
        if: steps.sign.outcome == 'success'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          zip "jira-thing-${{ matrix.suffix }}.zip" "jira-thing-${{ matrix.suffix }}"

          xcrun notarytool submit "jira-thing-${{ matrix.suffix }}.zip" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_PASSWORD}" \
            --wait

          rm "jira-thing-${{ matrix.suffix }}.zip"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: jira-thing-${{ matrix.suffix }}
          path: jira-thing-${{ matrix.suffix }}

  release:
    name: Create release
    needs: [build, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              dist/*
          else
            echo "Release ${TAG_NAME} already exists, uploading assets."
            gh release upload "${TAG_NAME}" dist/* --clobber
          fi
